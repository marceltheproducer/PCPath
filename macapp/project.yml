# XcodeGen spec for the PCPath macOS app + Finder Sync extension.
# Generate the Xcode project on a build Mac with:  xcodegen generate
# (brew install xcodegen)  — then build with build.sh.
name: PCPath
options:
  bundleIdPrefix: com.pcpath
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0.1"        # overridden by build.sh --version; shipped build is 1.0.1
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Manual
    # DEVELOPMENT_TEAM / CODE_SIGN_IDENTITY are passed by build.sh at build time.
    ENABLE_HARDENED_RUNTIME: YES

targets:
  # ---- Container app -------------------------------------------------------
  PCPath:
    type: application
    platform: macOS
    sources:
      - path: Sources/PCPathApp
      - path: Sources/PCPathKit
    info:
      path: Sources/PCPathApp/Info.plist
      properties:
        CFBundleName: PCPath
        CFBundleDisplayName: PCPath
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: "13.0"
        NSHumanReadableCopyright: "PCPath"
        # Regular app (shows in Dock when opened); harmless for a utility.
        LSApplicationCategoryType: public.app-category.utilities
    entitlements:
      path: Sources/PCPathApp/PCPathApp.entitlements
      # xcodegen GENERATES this file from these properties — declaring them here
      # (not by hand-editing the .entitlements) is the only way the values
      # survive `xcodegen generate`. The app is sandboxed and shares an app-group
      # container with the extension for the drive-mappings file.
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - 6M993C5R86.com.pcpath.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pcpath.PCPath
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
    dependencies:
      - target: PCPathFinderSync
        embed: true   # copied into PCPath.app/Contents/PlugIns/

  # ---- Finder Sync extension ----------------------------------------------
  PCPathFinderSync:
    type: app-extension
    platform: macOS
    sources:
      - path: Sources/FinderSync
      - path: Sources/PCPathKit
    info:
      path: Sources/FinderSync/Info.plist
      properties:
        CFBundleName: PCPathFinderSync
        CFBundleDisplayName: PCPath
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.FinderSync
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).FinderSync
    entitlements:
      path: Sources/FinderSync/FinderSync.entitlements
      # MUST be sandboxed or macOS (Tahoe+) silently refuses to register the
      # Finder Sync extension. Shares the app-group container with the app.
      # Declared here so `xcodegen generate` writes these into the .entitlements.
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - 6M993C5R86.com.pcpath.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pcpath.PCPath.FinderSync
