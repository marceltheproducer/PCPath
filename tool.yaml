# PCPath Tool Manifest
# Generated by tool-manifest skill — do not edit scoring fields manually.

name: PCPath
version: 1.2.0
description: >
  Cross-platform path converter that enables seamless file path conversion
  between macOS and Windows, with configurable drive-to-volume mappings.

owner: marcel.perez
repo: https://github.com/marceltheproducer/PCPath
platform: cross-platform  # macOS, Windows, and web

permissions:
  filesystem_read: true     # Reads ~/.pcpath_mappings config file; reads mounted volumes/mapped drives
  filesystem_write: true    # Writes ~/.pcpath_mappings on first install (default config)
  network: false            # No internet connection required. Fully offline.
  credentials: false        # No secrets, API keys, or tokens used.
  system_apis: true         # macOS: Automator Quick Actions, pbcopy/pbpaste; Windows: Registry (HKCU), Set-Clipboard
  child_process: false      # No child_process, exec, or spawn usage.
  kernel_or_driver: false   # No native modules, FFI, or elevation.

  details:
    filesystem:
      - read_write: "user home directory (~/.pcpath/, ~/.pcpath_mappings)"
      - read: "mounted volumes and mapped drives"
    clipboard:
      - macos: "pbcopy/pbpaste (copies converted path to clipboard)"
      - windows: "PowerShell Set-Clipboard/Get-Clipboard"
    system:
      - macos: "Automator Quick Actions (Finder right-click integration)"
      - windows: "Windows Registry context menu entries (HKCU only)"

dependencies:
  runtime: 0
  dev: 0
  sources: []
  unknown_deps: []
  notes: >
    No package manager dependencies. All scripts use only system-provided tools
    (bash, PowerShell, Automator). Web version is pure HTML/CSS/JS with no libraries.
  platforms:
    macos:
      - name: bash
        source: system
      - name: automator
        source: system
      - name: pbcopy
        source: system
      - name: pbpaste
        source: system
    windows:
      - name: powershell
        source: system
        version: ">=5.0"
      - name: windows-registry
        source: system
    web:
      - name: modern-browser
        source: user
        notes: "HTML5, CSS3, JavaScript, localStorage API. No external libraries."

compliance:
  third_party_data_flow: false    # No data sent to any external service.
  pii_handling: false             # No PII collected, stored, or transmitted.
  credential_storage: none        # No credentials used or stored.
  supply_chain_surface: none      # Zero runtime dependencies.

security:
  network_access: none
  data_collection: none
  data_storage: local_only
  data_exfiltration: none
  third_party_services: none
  runs_offline: true

built_from_template: false

score:
  total: 3
  tier: green
  rubric_source: embedded-default-v1.0.0
  breakdown:
    filesystem_read: 1      # Reads config file and volume paths
    filesystem_write: 2     # Writes default config on install
    network: 0
    credentials: 0
    system_apis: 0          # System clipboard + registry (low risk, user-scoped)
    child_process: 0
    kernel_or_driver: 0
    unknown_deps: 0
    template_discount: 0

intended_users:
  - Creative professionals working across macOS and Windows
  - Media and production teams using shared network volumes
  - IT teams deploying path converters across mixed-platform environments
